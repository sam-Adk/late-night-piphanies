<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign In — Late Night Epiphanies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Figtree:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
  <style>
    :root{--void:#05020f;--glass:rgba(255,255,255,0.055);--rim:rgba(255,255,255,0.10);--cyan:#00e5ff;--cyan-d:#00b8cc;--violet:#7c3aed;--rose:#f43f5e;--green:#00d44d;--text:#e2d9f3;--muted:#7a6e9a;--white:#f8f5ff;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{overflow-x:hidden;}
    body{font-family:'Figtree',sans-serif;background:var(--void);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.25;animation:af 18s ease-in-out infinite alternate;}
    .ab:nth-child(1){width:600px;height:500px;background:radial-gradient(circle,#7c3aed,transparent 70%);top:-200px;left:-100px;}
    .ab:nth-child(2){width:400px;height:400px;background:radial-gradient(circle,#00e5ff,transparent 70%);bottom:-100px;right:-80px;opacity:0.15;animation-delay:-8s;}
    @keyframes af{0%{transform:translate(0,0)}100%{transform:translate(30px,-40px)}}
    .dot-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,0.05) 1px,transparent 1px);background-size:36px 36px;}
    .auth-wrap{position:relative;z-index:1;width:min(100%,480px);}
    .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px;text-decoration:none;}
    .brand-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--violet),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(0,229,255,0.3);}
    .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--white);}
    .auth-box{background:linear-gradient(135deg,rgba(17,9,48,0.97),rgba(11,5,32,0.99));border:1px solid rgba(0,229,255,0.15);border-radius:20px;padding:36px;box-shadow:0 40px 100px rgba(0,0,0,0.8),0 0 60px rgba(0,229,255,0.06);}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:rgba(255,255,255,0.06);border-radius:10px;padding:3px;margin-bottom:24px;}
    .tab{padding:10px;border-radius:8px;border:none;background:none;color:var(--muted);font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
    .tab.active{background:rgba(0,229,255,0.12);color:var(--cyan);border:1px solid rgba(0,229,255,0.2);}
    .form{display:none;} .form.active{display:block;}
    .form-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);margin-bottom:4px;}
    .form-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:7px;}
    .field input{width:100%;padding:12px 15px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:var(--text);font-family:'Figtree',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
    .field input:focus{border-color:rgba(0,229,255,0.5);}
    .field input::placeholder{color:var(--muted);}
    .avatar-section{margin-bottom:18px;}
    .avatar-label{font-size:11px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;display:block;}
    .avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
    .av-btn{aspect-ratio:1;border-radius:10px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;padding:5px;}
    .av-btn:hover{border-color:rgba(0,229,255,0.3);}
    .av-btn.selected{border-color:var(--cyan);background:rgba(0,229,255,0.1);}
    .av-btn svg{width:100%;height:100%;display:block;}
    .submit-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--cyan-d),var(--cyan));border:none;color:var(--void);font-family:'Figtree',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.25s;box-shadow:0 0 30px rgba(0,229,255,0.2);margin-top:6px;}
    .submit-btn:hover{box-shadow:0 0 50px rgba(0,229,255,0.4);transform:translateY(-1px);}
    .submit-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;}
    .err{background:rgba(244,63,94,0.12);border:1px solid rgba(244,63,94,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--rose);margin-bottom:12px;display:none;word-break:break-word;}
    .suc{background:rgba(0,212,77,0.12);border:1px solid rgba(0,212,77,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:12px;display:none;}
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;}
    .divider-line{flex:1;height:1px;background:rgba(255,255,255,0.08);}
    .divider span{font-size:11px;color:var(--muted);}
    .sw-link{background:none;border:none;color:var(--cyan);cursor:pointer;font-size:13px;font-family:'Figtree',sans-serif;}
    .back-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none;transition:color 0.2s;}
    .back-link:hover{color:var(--cyan);}
  </style>
</head>
<body>
<div class="aurora"><div class="ab"></div><div class="ab"></div></div>
<div class="dot-grid"></div>

<div class="auth-wrap">
  <a href="index.html" class="brand">
    <div class="brand-icon">🌙</div>
    <div class="brand-name">Late Night Epiphanies</div>
  </a>

  <div class="auth-box">
    <div class="tabs">
      <button class="tab active" id="tabLogin">Sign In</button>
      <button class="tab" id="tabRegister">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="form active" id="loginForm">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to complete your purchase and track your orders.</div>
      <div class="err" id="loginError"></div>
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="field"><label>Password</label><input type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="submit-btn" id="loginBtn">Sign In →</button>
      <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>
      <div style="text-align:center;font-size:13px;color:var(--muted);">No account? <button class="sw-link" id="sw1">Create one →</button></div>
    </div>

    <!-- REGISTER -->
    <div class="form" id="registerForm">
      <div class="form-title">Create account</div>
      <div class="form-sub">Join to save your orders, wishlist &amp; delivery addresses.</div>
      <div class="err" id="registerError"></div>
      <div class="suc" id="registerSuccess"></div>
      <div class="field"><label>Full Name</label><input type="text" id="regName" placeholder="Your Name"/></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"/></div>
      <div class="field"><label>Phone <span style="opacity:0.5;font-size:10px;">(optional)</span></label><input type="tel" id="regPhone" placeholder="0712345678"/></div>
      <div class="field"><label>Password</label><input type="password" id="regPw" placeholder="Min 6 characters"/></div>
      <div class="avatar-section">
        <span class="avatar-label">Pick your avatar <span style="opacity:0.5;font-size:10px;">(optional)</span></span>
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>
      <button class="submit-btn" id="registerBtn">Create Account →</button>
      <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>
      <div style="text-align:center;font-size:13px;color:var(--muted);">Have an account? <button class="sw-link" id="sw2">Sign in →</button></div>
    </div>
  </div>

  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Continue browsing without signing in
  </a>
</div>

<script>
  const AVATARS=[`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#1a0a3d"/><circle cx="40" cy="36" r="22" fill="#7c3aed"/><circle cx="32" cy="32" r="7" fill="white"/><circle cx="48" cy="32" r="7" fill="white"/><circle cx="33" cy="33" r="4" fill="#1a0a3d"/><circle cx="49" cy="33" r="4" fill="#1a0a3d"/><circle cx="34" cy="32" r="1.5" fill="white"/><circle cx="50" cy="32" r="1.5" fill="white"/><ellipse cx="40" cy="44" rx="6" ry="3" fill="#ff9f43"/><path d="M34 50 Q40 56 46 50" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#0b1a3d"/><circle cx="40" cy="38" r="24" fill="#1e40af"/><ellipse cx="40" cy="34" rx="16" ry="14" fill="#3b82f6"/><circle cx="33" cy="31" r="5" fill="white"/><circle cx="47" cy="31" r="5" fill="white"/><circle cx="34" cy="32" r="3" fill="#0b1a3d"/><circle cx="48" cy="32" r="3" fill="#0b1a3d"/><path d="M33 40 Q40 46 47 40" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#05020f"/><circle cx="40" cy="38" r="24" fill="#c9a84c"/><circle cx="40" cy="35" r="18" fill="#e8c97b"/><circle cx="33" cy="31" r="5" fill="#4a3000"/><circle cx="47" cy="31" r="5" fill="#4a3000"/><circle cx="34" cy="32" r="2" fill="#05020f"/><circle cx="48" cy="32" r="2" fill="#05020f"/><path d="M34 42 Q40 48 46 42" stroke="#4a3000" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#0f0f1a"/><circle cx="40" cy="38" r="24" fill="#2d1b69"/><ellipse cx="40" cy="36" rx="18" ry="16" fill="#4c1d95"/><circle cx="33" cy="32" r="6" fill="white"/><circle cx="47" cy="32" r="6" fill="white"/><circle cx="34" cy="33" r="3.5" fill="#7c3aed"/><circle cx="48" cy="33" r="3.5" fill="#7c3aed"/><path d="M34 42 Q40 47 46 42" stroke="#00e5ff" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#0a0806"/><circle cx="40" cy="40" r="24" fill="#444"/><polygon points="26,20 22,8 32,16" fill="#2d2d2d"/><polygon points="54,20 58,8 48,16" fill="#2d2d2d"/><ellipse cx="33" cy="33" rx="6" ry="4" fill="#00e5ff" opacity="0.9"/><ellipse cx="47" cy="33" rx="6" ry="4" fill="#00e5ff" opacity="0.9"/><ellipse cx="33" cy="34" rx="2" ry="3.5" fill="#0a0806"/><ellipse cx="47" cy="34" rx="2" ry="3.5" fill="#0a0806"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#050b1f"/><circle cx="40" cy="38" r="22" fill="#2563eb"/><rect x="24" y="26" width="32" height="22" rx="11" fill="none" stroke="white" stroke-width="2.5"/><circle cx="33" cy="34" r="4" fill="white"/><circle cx="47" cy="34" r="4" fill="white"/><circle cx="34" cy="35" r="2.5" fill="#050b1f"/><circle cx="48" cy="35" r="2.5" fill="#050b1f"/><path d="M34 42 Q40 47 46 42" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#1a0a00"/><ellipse cx="40" cy="34" rx="15" ry="13" fill="#fb923c"/><circle cx="33" cy="31" r="5" fill="white"/><circle cx="47" cy="31" r="5" fill="white"/><circle cx="34" cy="32" r="3" fill="#431407"/><circle cx="48" cy="32" r="3" fill="#431407"/><path d="M33 42 Q40 49 47 42" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#052005"/><ellipse cx="40" cy="34" rx="15" ry="13" fill="#22c55e"/><circle cx="33" cy="30" r="5" fill="white"/><circle cx="47" cy="30" r="5" fill="white"/><circle cx="34" cy="31" r="3" fill="#052005"/><circle cx="48" cy="31" r="3" fill="#052005"/><path d="M34 40 Q40 47 46 40" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#000"/><rect x="18" y="26" width="44" height="28" rx="4" fill="#27272a"/><ellipse cx="31.5" cy="33.5" rx="5" ry="3.5" fill="#00e5ff" opacity="0.8"/><ellipse cx="48.5" cy="33.5" rx="5" ry="3.5" fill="#f43f5e" opacity="0.8"/><path d="M32 42 L38 44 L40 42 L42 44 L48 42" stroke="#a3e635" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,`<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="38" fill="#03001c"/><circle cx="40" cy="36" r="20" fill="#2d1b69"/><circle cx="33" cy="31" r="6" fill="white"/><circle cx="47" cy="31" r="6" fill="white"/><circle cx="34" cy="32" r="4" fill="#4c1d95"/><circle cx="48" cy="32" r="4" fill="#4c1d95"/><circle cx="35" cy="31" r="2" fill="white"/><circle cx="49" cy="31" r="2" fill="white"/><path d="M33 42 Q40 50 47 42" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`];

  let selectedAvatar = 1;
  const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || '/';

  // If already logged in redirect
  if (localStorage.getItem('lne_token')) window.location.href = redirectUrl;

  // Build avatars
  const grid = document.getElementById('avatarGrid');
  AVATARS.forEach((svg, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'av-btn' + (i === 0 ? ' selected' : '');
    btn.innerHTML = svg;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAvatar = i + 1;
    });
    grid.appendChild(btn);
  });

  // Tab switching
  const switchTab = tab => {
    document.querySelectorAll('.tab,.form').forEach(el => el.classList.remove('active'));
    document.getElementById('tab' + tab).classList.add('active');
    document.getElementById(tab.toLowerCase() + 'Form').classList.add('active');
  };
  document.getElementById('tabLogin').addEventListener('click', () => switchTab('Login'));
  document.getElementById('tabRegister').addEventListener('click', () => switchTab('Register'));
  document.getElementById('sw1').addEventListener('click', () => switchTab('Register'));
  document.getElementById('sw2').addEventListener('click', () => switchTab('Login'));

  // ── Helper: safe fetch that always returns parsed data ──
  async function safeFetch(url, options) {
    const res = await fetch(url, options);
    const text = await res.text();
    if (!text || text.trim() === '') {
      throw new Error('Empty response from server (status ' + res.status + ')');
    }
    try {
      return JSON.parse(text);
    } catch {
      throw new Error('Server returned: ' + text.slice(0, 100));
    }
  }

  // ── LOGIN ──
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPw').value;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    if (!email || !password) { errEl.textContent = 'Please fill in all fields'; errEl.style.display = 'block'; return; }
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    try {
      const data = await safeFetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (data.success) {
        localStorage.setItem('lne_token', data.token);
        localStorage.setItem('lne_user', JSON.stringify(data.user));
        window.location.href = redirectUrl;
      } else {
        errEl.textContent = data.error || 'Login failed';
        errEl.style.display = 'block';
      }
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    }
    btn.textContent = 'Sign In →'; btn.disabled = false;
  });
  document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });

  // ── REGISTER ──
  document.getElementById('registerBtn').addEventListener('click', async () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPw').value;
    const errEl = document.getElementById('registerError');
    const sucEl = document.getElementById('registerSuccess');
    errEl.style.display = 'none'; sucEl.style.display = 'none';
    if (!name || !email || !password) { errEl.textContent = 'Name, email and password required'; errEl.style.display = 'block'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return; }
    const btn = document.getElementById('registerBtn');
    btn.textContent = 'Creating account…'; btn.disabled = true;
    try {
      const data = await safeFetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, password, avatar: selectedAvatar })
      });
      if (data.success) {
        localStorage.setItem('lne_token', data.token);
        localStorage.setItem('lne_user', JSON.stringify(data.user));
        sucEl.textContent = '✅ Account created! Redirecting…';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = redirectUrl, 1000);
      } else {
        errEl.textContent = data.error || 'Registration failed';
        errEl.style.display = 'block';
      }
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    }
    btn.textContent = 'Create Account →'; btn.disabled = false;
  });
</script>
</body>
</html>
